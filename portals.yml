# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#   Using raw ATS URLs when a branded page exists can cause false 410 errors (job ID mismatch).
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- AI Ops (primary target) --
    - "AI Ops"
    - "AI Operations"
    - "AI Project Manager"
    - "AI Program Manager"
    - "AI Workflow"
    - "Automation Specialist"
    - "Automation Manager"
    - "Automation Lead"
    - "AI Tools"
    - "AI Implementation"
    # -- Strategic ops / leadership --
    - "Head of Operations"
    - "Director of Operations"
    - "VP of Operations"
    - "Fractional COO"
    - "Chief of Staff"
    - "Business Operations"
    - "Biz Ops"
    - "BizOps"
    - "Ops Lead"
    # -- Project / Program --
    - "Project Manager"
    - "Program Manager"
    - "Operations Manager"
    - "Ops Manager"
    # -- Workflow / systems --
    - "Workflow"
    - "Process Improvement"
    - "Systems"
    - "No-Code"
    - "Low-Code"
    - "RevOps"
  negative:
    - "Junior"
    - "Intern"
    - "Fellowship"
    - "Fellows Program"
    - "Residency"
    - "Research Scientist"
    - "Research Engineer"
    - "ML Systems"
    - "Machine Learning"
    - "On-site"
    - "On site"
    - "In-office"
    - "In office"
    - "Executive Assistant"
    - "Virtual Assistant"
    - "Admin Assistant"
    - "Administrative Assistant"
    - "Engineer"
    - "Developer"
    - "Software"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Senior"
    - "Sr."
    - "Staff "
    - "Principal"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

location_filter:
  # Only include jobs that mention "Remote" in the location field.
  # Catches "Remote", "Remote, US", "Remote — Worldwide", etc.
  # Set to false to disable and receive all locations.
  require_remote: true

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby — AI Ops & Automation --
  - name: Ashby — AI Ops Specialist
    query: 'site:jobs.ashbyhq.com "AI Ops" OR "AI Operations" OR "AI Project Manager" OR "AI Program Manager" remote'
    enabled: true

  - name: Ashby — Automation Specialist
    query: 'site:jobs.ashbyhq.com "Automation Specialist" OR "Automation Manager" OR "Automation Lead" OR "Workflow" remote'
    enabled: true

  - name: Ashby — Head of Ops / Chief of Staff
    query: 'site:jobs.ashbyhq.com "Head of Operations" OR "Chief of Staff" OR "Director of Operations" OR "BizOps" remote'
    enabled: true

  - name: Ashby — No-Code & Process
    query: 'site:jobs.ashbyhq.com "no-code" OR "low-code" OR "Notion" OR "Zapier" OR "Claude" operations OR ops remote'
    enabled: true

  # -- Greenhouse — AI Ops & Automation --
  - name: Greenhouse — AI Ops
    query: 'site:job-boards.greenhouse.io "AI Ops" OR "AI Operations" OR "AI Project Manager" OR "Automation Specialist" remote'
    enabled: true

  - name: Greenhouse — Head of Ops / CoS
    query: 'site:job-boards.greenhouse.io "Head of Operations" OR "Chief of Staff" OR "Director of Operations" OR "Fractional COO" remote'
    enabled: true

  - name: Greenhouse — Business Operations
    query: 'site:job-boards.greenhouse.io "Business Operations" OR "BizOps" OR "RevOps" OR "Ops Manager" AI OR startup remote'
    enabled: true

  # -- Workable --
  - name: Workable — AI Ops & Automation
    query: 'site:apply.workable.com "AI Operations" OR "Automation Specialist" OR "Head of Operations" OR "Chief of Staff" remote'
    enabled: true

  # -- Remote job boards --
  - name: Remotive — Ops & Automation
    query: 'site:remotive.com "Operations Manager" OR "Chief of Staff" OR "AI Ops" OR "Automation" OR "BizOps" remote'
    enabled: true

  - name: WeWorkRemotely — Ops & Management
    query: 'site:weworkremotely.com "Operations Manager" OR "Chief of Staff" OR "Head of Operations" OR "Automation"'
    enabled: true

  - name: Working Nomads — Ops Roles
    query: 'site:workingnomads.com "Operations Manager" OR "Chief of Staff" OR "AI Operations" OR "Automation Specialist"'
    enabled: true

  - name: RemoteOK — Ops & Automation
    query: 'site:remoteok.com "Operations" OR "Chief of Staff" OR "Automation" OR "BizOps" remote'
    enabled: true

  - name: Himalayas — Ops & AI Ops
    query: 'site:himalayas.app "Operations Manager" OR "Chief of Staff" OR "AI Ops" OR "Automation Specialist" remote'
    enabled: true

  # -- AI-specific job boards --
  - name: ai-jobs.net — AI Ops & Ops roles
    query: 'site:ai-jobs.net "Operations" OR "AI Ops" OR "Chief of Staff" OR "Automation" remote'
    enabled: true

  # -- YC / startup-focused --
  - name: YC Jobs — Ops & CoS at AI startups
    query: 'site:workatastartup.com "Operations" OR "Chief of Staff" OR "Head of Ops" OR "BizOps" remote'
    enabled: true

  # -- LATAM & global freelance/contract --
  - name: Toptal — Ops & Automation freelance
    query: 'site:toptal.com "Operations" OR "Chief of Staff" OR "Automation" OR "Project Manager" remote freelance'
    enabled: true

  - name: HN Who's Hiring — Ops & Automation
    query: 'site:news.ycombinator.com "Operations" OR "Chief of Staff" OR "AI Ops" OR "Automation" remote'
    enabled: true

# -- Tracked companies --
# Companies whose career pages are checked directly.
# scan_method: playwright (default), websearch, greenhouse_api
# For Greenhouse companies, add api: field for faster structured JSON access.
# Focus: async-first, remote-friendly, AI-native or AI-adjacent, hire for ops roles.

tracked_companies:

