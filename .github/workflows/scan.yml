name: Job Scan

on:
  schedule:
    - cron: '0 12 */3 * *'  # every 3 days at noon UTC
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --silent

      - name: Run scanner
        run: node scan.mjs 2>&1 | tee /tmp/scan-output.txt

      - name: Post GitHub Issue if new matches found
        run: node post-scan-issue.mjs "${{ secrets.GITHUB_TOKEN }}" < /tmp/scan-output.txt

      - name: Commit updated scan history
        run: |
          git config user.name "career-ops-bot"
          git config user.email "career-ops-bot@users.noreply.github.com"
          git add data/scan-history.tsv
          git diff --cached --quiet || git commit -m "chore: update scan history [skip ci]"
          git push
